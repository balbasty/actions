name: Run tests
description: Run tests

on:
  workflow_call:
    inputs:
      tag:
        description: 'Commit / Branch / Tag / SHA to checkout ("" for current)'
        required: false
        default: ''
        type: string
      python-version:
        description: 'Python version ("" for latest)'
        required: false
        default: ''
        type: string
      pytorch-version:
        description: 'PyTorch version ("" if not a dep)'
        required: false
        default: ''
        type: string
      requirements:
        description: 'Path to requrements.txt ("" if none)'
        required: false
        default: ''
        type: string

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          
      - name: Setup Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          
      - name: Install PyTorch
        if: ${{ inputs.pytorch-version != "" }}
        shell: bash -el {0}
        env:
          PYTORCH_VERSION: ${{ inputs.pytorch-version }}
        run: pip install "torch==${PYTORCH_VERSION}" --index-url https://download.pytorch.org/whl/cpu
          
      - name: Install PyTest
        shell: bash -el {0}
        run: pip install pytest
          
      - name: Install Other Dependencies
        if: ${{ inputs.requirements != "" }}
        shell: bash -el {0}
        env:
          REQUIREMENTS: ${{ inputs.requirements }}
        run: pip install -r "${REQUIREMENTS}"
          
      - name: Install package
        shell: bash -el {0}
        run: pip install .
        
      - name: Test with pytest
        shell: bash -el {0}
        run: pytest
